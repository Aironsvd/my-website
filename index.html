<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Gift Hidden Among The Stars ✨</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background -->

    <div class="galaxy-background">

        <div id="stars"></div>

        <div id="flowers"></div>

    </div>



    <!-- Login Card -->

    <div class="login-card">

        <h1>
            ✨ A Gift Hidden Among The Stars ✨
        </h1>

        <p class="message">

            Some gifts aren't meant for everyone.

            <br><br>

            This one was created for one special soul.

            <br><br>

            If you're <strong>Paglu</strong>,

            the stars already know your name.

        </p>



        <input
            type="password"
            id="password"
            placeholder="Enter the Secret Key">




        <button id="unlockButton">

            🌸 Unlock the Stars 🌸

        </button>



        <p id="errorMessage">

            Oops...

            This gift is waiting for someone special. 💖

        </p>

    </div>



    <script src="script.js"></script>

</body>

              </html>
